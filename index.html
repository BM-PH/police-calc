<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>엑시트 경찰청 법률계산기</title>
  <style>
    :root {
      --bg: #09090b; --panel: #14141b; --card: #1c1c28; --accent: #8b5cf6;
      --accent-glow: rgba(139, 92, 246, 0.4); --text: #f4f4f5; --muted: #a1a1aa;
      --border: rgba(255, 255, 255, 0.1); --danger: #ef4444; --success: #22c55e;
    }
    [data-theme="cream"] {
      --bg: #fdfaf6; --panel: #ffffff; --card: #f3f0ec; --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.2); --text: #2d2a26; --muted: #78716c;
      --border: rgba(0, 0, 0, 0.12); --danger: #dc2626; --success: #16a34a;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; user-select: none; }
    
    /* 모바일 접속 차단 스타일 */
    #mobile-block {
      position: fixed; inset: 0; background: #000; color: #fff;
      display: none; flex-direction: column; justify-content: center; align-items: center;
      z-index: 100000; font-size: 20px; font-weight: 800; text-align: center; line-height: 1.6;
    }
    @media (max-width: 1024px) {
      #mobile-block { display: flex; }
      body { overflow: hidden; }
    }

    body {
      margin: 0; font-family: "Pretendard Variable", sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.3s;
      position: relative;
    }

    /* 백그라운드 반투명 로고 설정 */
    body::before {
      content: "EXIT POLICE"; /* 이미지 대신 텍스트 로고 사용 (이미지 사용 시 아래 주석 참고) */
      /* content: ""; background-image: url('이미지주소'); background-size: contain; background-repeat: no-repeat; */
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg); /* 살짝 기울여서 간지나게 */
      font-size: 12vw; /* 화면 크기에 맞게 자동 조절 */
      font-weight: 900;
      color: var(--text);
      opacity: 0.03; /* 아주 은은하게 (0.03 ~ 0.05 추천) */
      pointer-events: none; /* 클릭 방해 금지 */
      z-index: 0;
      white-space: nowrap;
    }

    header, .main-container { position: relative; z-index: 1; } /* 로고보다 위에 오도록 설정 */

    header {
      padding: 15px 40px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.05);
    }
    .logo-group h1 { margin: 0; font-size: 22px; font-weight: 900; cursor: default; }

    .main-container {
      flex: 1; display: grid; grid-template-columns: 1fr 420px;
      gap: 0; overflow: hidden;
    }

    .left-section {
      display: flex; flex-direction: column; padding: 25px 40px; border-right: 1px solid var(--border);
      overflow: hidden; background: transparent; /* 로고가 보이도록 투명화 */
    }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
    .tab {
      padding: 12px 22px; border-radius: 12px; border: 1px solid var(--border);
      background: var(--panel); color: var(--muted); cursor: pointer;
      font-size: 15px; font-weight: 700; transition: 0.2s; white-space: nowrap;
    }
    .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

    .item-grid {
      flex: 1; overflow-y: auto; display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 15px; padding: 10px 5px; align-content: start;
    }

    .item-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px; cursor: pointer; transition: transform 0.2s ease, border-color 0.2s, background 0.2s; 
    }
    .item-card:hover { border-color: var(--accent); transform: translateY(-4px); background: var(--card); }
    .item-card.selected { border-color: var(--accent); background: rgba(139, 92, 246, 0.08); box-shadow: 0 4px 15px var(--accent-glow); }
    .item-card .name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .item-card .price { font-size: 13px; color: var(--muted); }

    .right-section { background: rgba(20, 20, 27, 0.8); backdrop-filter: blur(5px); padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
    .res-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 16px; transition: 0.3s; }
    .res-label { font-size: 12px; color: var(--accent); font-weight: 800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .res-val { font-size: 32px; font-weight: 900; line-height: 1; }
    .res-ko { font-size: 15px; color: var(--muted); margin-top: 8px; font-weight: 600; }

    .res-card.warning { border-color: var(--danger); }
    .res-card.warning .res-label { color: var(--danger); }
    .res-card.warning .res-val { color: var(--danger); animation: blink 1.5s infinite; }

    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .calc-list { flex: 1; border-top: 1px solid var(--border); padding-top: 15px; font-size: 14px; line-height: 1.8; overflow-y: auto; }
    .calc-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .calc-item.bail { color: var(--success); font-weight: 700; border-bottom: 1px dashed var(--border); padding-bottom: 5px; margin-bottom: 8px; }

    .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: auto; padding-top: 15px; }
    .btn { padding: 15px; border-radius: 12px; font-size: 16px; font-weight: 800; border: none; cursor: pointer; transition: 0.2s; }
    .btn-copy { background: var(--accent); color: white; }
    .btn-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-reset:hover { background: var(--danger); color: white; border-color: var(--danger); }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 9999; }
    
    .modal-qty { background: var(--panel); border: 2px solid var(--accent); padding: 30px; border-radius: 24px; width: 440px; text-align: left; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
    .modal-qty h2 { font-size: 20px !important; margin: 0 0 20px 0; color: var(--text); font-weight: 800; border-left: 4px solid var(--accent); padding-left: 12px; }
    .qty-controls { display: flex; gap: 12px; align-items: center; }
    .modal-qty input { width: 120px; height: 55px; background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 12px; font-size: 24px; font-weight: 900; text-align: center; outline: none; }
    .modal-qty .btn { height: 55px; flex: 1; border-radius: 12px; font-size: 16px; display: flex; align-items: center; justify-content: center; margin: 0; }

    .modal-guide { 
      background: var(--panel); border: 2px solid var(--accent); padding: 40px; border-radius: 30px; 
      width: 90%; max-width: 1100px; text-align: center; max-height: 80vh; overflow-y: auto; 
      box-shadow: 0 25px 60px rgba(0,0,0,0.7); 
    }
    .guide-grid { display: grid; grid-template-columns: 1fr; gap: 15px; width: 100%; }
    .guide-opt { 
      background: var(--card); border: 1px solid var(--border); padding: 20px 30px; border-radius: 16px; 
      cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 8px; text-align: left; 
    }
    .guide-opt:hover { border-color: var(--accent); background: rgba(139, 92, 246, 0.15); transform: translateX(5px); }
    .guide-opt .title { font-weight: 800; color: var(--accent); font-size: 17px; }
    .guide-opt .desc { font-size: 14px; color: var(--muted); line-height: 1.5; white-space: pre-wrap; }

    .modal-reason { background: var(--panel); border: 1px solid var(--accent); padding: 35px; border-radius: 24px; width: 420px; text-align: center; }
    .modal-reason h2 { margin: 0; font-size: 18px; color: var(--accent); margin-bottom: 5px; }
    .modal-reason p { margin: 0 0 15px 0; font-size: 14px; color: var(--muted); }
    .modal-reason input { width: 100%; height: 55px; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 0 15px; border-radius: 12px; font-size: 18px; margin-bottom: 20px; outline: none; text-align: center; }

    #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 14px 28px; border-radius: 50px; font-size: 15px; font-weight: 800; visibility: hidden; opacity: 0; transition: 0.3s; z-index: 10000; }
    #toast.show { visibility: visible; opacity: 1; bottom: 60px; }

    header .theme-btns { display:flex; background:var(--card); padding:5px; border-radius:10px; border:1px solid var(--border); gap:5px; }
    header .theme-btns button { border:none; padding:5px 15px; border-radius:7px; cursor:pointer; font-size:18px; }
    
    .bail-input-group { padding:0 5px; }
    .bail-input-group label { font-size:12px; color:var(--muted); font-weight:700; display:block; margin-bottom:8px; text-transform:uppercase; }
    .bail-input-group input { width:100%; background:var(--card); border:1px solid var(--border); padding:12px; border-radius:10px; color:var(--text); font-size:18px; font-weight:700; outline:none; }
  </style>
</head>
<body>

  <div id="mobile-block">PC에서만 볼 수 있습니다.</div>

  <div id="qtyModal" class="overlay">
    <div class="modal-qty">
      <h2 id="mTitle">수량 설정</h2>
      <div class="qty-controls">
        <input type="number" id="mInput" value="1" onfocus="this.select()" onkeydown="if(event.key==='Enter') confirmQty()">
        <button class="btn btn-copy" onclick="confirmQty()">적용하기</button>
        <button class="btn btn-reset" onclick="removeIdx()">항목 제거</button>
      </div>
    </div>
  </div>

  <div id="guideModal" class="overlay">
    <div class="modal-guide">
      <h2 id="gTitle" style="font-size: 26px; margin-bottom: 30px; font-weight: 900; color: var(--accent);">공지 상세 선택</h2>
      <div class="guide-grid" id="guideButtons"></div>
      <p style="margin-top:35px; font-size:15px; color:var(--muted); cursor:pointer; font-weight: 700;" onclick="closeModal()">취소하고 닫기</p>
    </div>
  </div>

  <div id="reasonModal" class="overlay">
    <div class="modal-reason">
      <h2 id="varCountText">입력 (1/1)</h2>
      <p id="varTargetText">대상: 00</p>
      <input type="text" id="reasonInput" placeholder="내용 입력..." onkeydown="if(event.key==='Enter') nextVariable()">
      <div style="display:flex; gap:12px;">
        <button class="btn btn-copy" id="varBtn" style="flex:1" onclick="nextVariable()">다음</button>
        <button class="btn btn-reset" style="flex:1" onclick="closeReasonModal()">취소</button>
      </div>
    </div>
  </div>

  <header>
    <div class="logo-group"><h1>엑시트 경찰청 법률계산기</h1></div>
    <div class="theme-btns">
      <button onclick="setTheme('dark')" id="tDark">🌙</button>
      <button onclick="setTheme('cream')" id="tCream">🍦</button>
    </div>
  </header>

  <div class="main-container">
    <section class="left-section">
      <div class="tabs" id="tabs"></div>
      <div class="item-grid" id="itemList"></div>
    </section>

    <aside class="right-section">
      <div class="res-card">
        <div class="res-label">최종 벌금 합계</div>
        <div class="res-val" id="resFine">0원</div>
        <div class="res-ko" id="resFineKo">영 원</div>
      </div>
      <div class="res-card" id="timeCard">
        <div class="res-label" id="timeLabel">최종 구금 시간</div>
        <div class="res-val" id="resTime">0분</div>
      </div>
      <div class="bail-input-group">
        <label>보석금 감면 (분당 300만)</label>
        <input type="number" id="bailIn" value="0" onfocus="this.select()">
      </div>
      <div class="calc-list" id="calcRows"></div>
      <div class="btn-group">
        <button class="btn btn-copy" onclick="copyFinal()">전체 내역 복사</button>
        <button class="btn btn-reset" onclick="resetAll()">모든 항목 초기화</button>
      </div>
    </aside>
  </div>

  <div id="toast">복사되었습니다!</div>

<script>
  /* 데이터 및 로직은 이전과 동일 */
  const DATA = {
    "도로교통법": [
      { name:"소음공해", fine: 10000000, time: 0 }, { name:"불법 주정차", fine: 10000000, time: 0 },

      { name:"불법 유턴", fine: 10000000, time: 0 }, { name:"역주행/차선위반", fine: 10000000, time: 0 },

      { name:"공무집행 방해", fine: 150000000, time: 30 }, { name:"무단 침입", fine: 200000000, time: 30 },
      { name:"공무원 폭행", fine: 250000000, time: 20 }, { name:"공무원 살인", fine: 400000000, time: 40 }
    ],
    "스토리RP": [
      { name:"즉흥/수배RP", fine: 250000000, time: 30 }, { name:"영장RP", fine: 400000000, time: 30 },
      { name:"은행/보석상 RP", fine: 120000000, time: 20 }, { name:"도주 RP", fine: 100000000, time: 20 }
    ],
    "EXIT 경찰청 사이드 공지": [
      { name:"무단침입 공지", opts: [{ label: "공지 복사", val: "/경찰청 현 시간부로 경찰청 사유지 에 이유없이 방문하시는 경우 3회 이상 경고 후 사살합니다. (지속적으로 소란을 피울 경우 공무집행 방해로 체포하겠습니다.) - 엑시트 경찰청 -" }] },
      { name:"경찰청 면접 공지", opts: [{ label: "운전면접 공지", val: "/경찰청 경찰청 운전면접을 진행합니다. 주행중 경찰청 차량이 경광등,사이렌을 점등하여 고속으로 달려오는 경우 좌우로 피양해 주시기 바랍니다. 또한 면접중 발생하는 사고에 대해 하이브 경찰청 에서는 어떠한 금전적 보상을 해드리지 않습니다.  - 엑시트 경찰청 -" }] },
      { name:"업무 관련 공지", opts: [{ label: "신고대응 지연", val: "/경찰청 현재 사건 처리중인 경찰관 이 많아 신고콜 대응이 늦어질 수도 있습니다. 만일 신고를 하셨는데 경찰관이 안올 경우 해당자리에서 기다린 후 다시 콜해주시기 바랍니다.  - 엑시트 경찰청 -" }] },
      { name:"단속 공지", opts: [{ label: "단속 시작", val: "/경찰청 현시간부터 00시까지 불법물건(무기)단속을 진행합니다. 시민분들께서는 경찰관이 소지품 확인을 요청할 경우 협조해주시기 바랍니다. 또한 검문을 진행하는 도중 핸드폰을 열경우 담당 경찰관 의 재량으로 증거인멸죄 성립이 가능함을 알려드립니다.  - 엑시트 경찰청 -" }, { label: "단속 종료", val: "/경찰청 불법물건(00)단속을 종료합니다 시민분들의 협조 감사합니다. - 엑시트 경찰청 -" }] },
      { name:"회의 공지", opts: [{ label: "RP 거부 안내", val: "/경찰청 잠시후 00시부터 00시까지 경찰청 내부(회의,훈련)로 인해 약0시간 동안 모든 알피를 거부합니다. 시민분들의 양해 부탁드립니다. - 엑시트 경찰청 -" }, { label: "정상 대응 안내", val: "/경찰청 현시간 부로 모든 강도알피 대응이 가능합니다 대기해주신 시민분들께 감사드립니다. - 엑시트 경찰청 -" }] },
      { name:"헬기 이륙 공지", opts: [{ label: "이륙 공지", val: "/경찰청 경찰청 헬기 00사유로 이륙합니다. - 엑시트 경찰청 -" }] }
    ],
    "EXIT 경찰청 RP관련 사이드 공지": [
      { name:"편의점", opts: [
        { label: "편의점 1", val: "/경찰청 [ 남부 편의점 1 ]\n편의점 1에서 강도 발생으로 편의점 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" },
        { label: "편의점 2", val: "/경찰청 [ 남부 편의점 2 ]\n편의점 2에서 강도 발생으로 편의점 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" },
        { label: "편의점 3", val: "/경찰청 [ 남부 편의점 3 ]\n편의점 3에서 강도 발생으로 편의점 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" }
      ]},
      { name:"ATM", opts: [
        { label: "ATM 1", val: "/경찰청 [ 남부 ATM 1 ]\n남부 ATM 1에서 강도 발생으로 ATM 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" },
        { label: "ATM 2", val: "/경찰청 [ 남부 ATM 2 ]\n남부 ATM 2에서 강도 발생으로 ATM 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" }
      ]},
      { name:"클럽", opts: [{ label: "클럽 공지", val: "/경찰청 [ 클럽 ]\n클럽 에서 강도 발생으로 클럽 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" }] },
      { name:"보석상", opts: [{ label: "보석상 공지", val: "/경찰청 [ 보석상 ]\n보석상 에서 강도 발생으로 보석상 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" }] },
      { name:"남부은행", opts: [{ label: "남부은행 공지", val: "/경찰청 [ 남부은행 ]\n남부은행 에서 강도 발생으로 남부은행 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" }] },
      { name:"빈집털이", opts: [{ label: "빈집털이 공지", val: "/경찰청 [ 빈집털이 ]\n남부 빈집털이 에서 강도 발생으로 남부 빈집털이 위치로 부터 2블럭 이내 접근시 공범으로 간주하여 경고 없이 사살합니다.\n국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" }] },
      { name:"무력진압", opts: [{ label: "무력진압 시작", val: "[ 무력진압 ] (RP이름) 경# 무력진압 시작합니다." }] },
      { name:"중북부 진입", opts: [
        { label: "도주자 진입", val: "/경찰청 도주자 중북부 진입으로 보안국 관할 진입합니다. 국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" },
        { label: "수배자 진입", val: "/경찰청 수배자 중북부 진입으로 보안국 관할 진입합니다. 국민이 공감하는 공존의 정의, 민생에 힘이 되는 법무행정 - 엑시트 경찰청" },
        { label: "남부 복귀", val: "/경찰청 중북부 상황 종료로 경찰 관할로 복귀합니다." }
      ]},
      { name:"비상령", opts: [
        { label: "비상령 발령", val: "/경찰청 경찰청에서 안내드립니다. (비상령단계) 발령합니다, (사유) 비상령 발령으로 (기간) 동안 남부는 경찰청 안내사항 채널에 나와있는것과 동일하게 치안유지가 될 것이며 이외 안내는 안내사항 채널 확인바랍니다." },
        { label: "비상령 해제", val: "/경찰청 (비상령단계) 해제합니다." },
        { label: "비상령 변경", val: "/경찰청 (비상령단계)에서 (비상령단계)로 변경합니다." }
      ]}
    ]
  };

  let activeTab = "도로교통법";
  let curKey = null;
  const state = new Map();
  let noticeFlow = { originalText: "", placeholders: [], currentIndex: 0, results: [] };

  function setTheme(t) {
    document.body.setAttribute('data-theme', t);
    const isD = t === 'dark';
    document.getElementById('tDark').style.background = isD ? 'var(--accent)' : 'transparent';
    document.getElementById('tCream').style.background = !isD ? 'var(--accent)' : 'transparent';
  }

  function showT(m) {
    const t = document.getElementById("toast"); t.textContent = m;
    t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 2000);
  }

  function renderList() {
    const $l = document.getElementById("itemList"); $l.innerHTML = "";
    DATA[activeTab].forEach(item => {
      const key = `${activeTab}::${item.name}`;
      if(!state.has(key)) state.set(key, {checked:false, qty:0, item});
      const s = state.get(key);
      const div = document.createElement("div");
      div.className = `item-card ${s.checked?'selected':''}`;
      div.innerHTML = `<div class="name">${item.name}</div><div class="price">${(activeTab.includes('공지'))?'공지 확인':(item.fine/10000).toLocaleString()+'만 / '+item.time+'분'}</div>`;
      div.onclick = () => {
        if(activeTab.includes('공지')) openGuide(item);
        else if(activeTab==='스토리RP') toggleStoryItem(key);
        else openQty(activeTab, item);
      };
      $l.appendChild(div);
    });
  }

  function toggleStoryItem(key) {
    const s = state.get(key);
    if(s.checked) { s.checked = false; s.qty = 0; }
    else { s.checked = true; s.qty = 1; }
    renderList(); update();
  }

  function openGuide(item) {
    document.getElementById("gTitle").textContent = item.name;
    const btnContainer = document.getElementById("guideButtons");
    btnContainer.innerHTML = "";
    item.opts.forEach(opt => {
      const div = document.createElement("div");
      div.className = "guide-opt";
      div.onclick = () => startNoticeFlow(opt.val);
      div.innerHTML = `<div class="title">${opt.label}</div><div class="desc">${opt.val}</div>`;
      btnContainer.appendChild(div);
    });
    document.getElementById("guideModal").style.display = "flex";
  }

  function startNoticeFlow(val) {
    const regex = /00|OOO|O시|O분|0명|약0시간|\([^\)]+\)/g;
    const matches = val.match(regex);
    if (matches) {
      noticeFlow = { originalText: val, placeholders: matches, currentIndex: 0, results: [] };
      showVariableModal();
    } else {
      copyText(val);
    }
  }

  function showVariableModal() {
    const { placeholders, currentIndex } = noticeFlow;
    document.getElementById("varCountText").textContent = `상세 입력 (${currentIndex + 1}/${placeholders.length})`;
    document.getElementById("varTargetText").textContent = `대상: ${placeholders[currentIndex]}`;
    document.getElementById("reasonInput").value = "";
    document.getElementById("varBtn").textContent = (currentIndex === placeholders.length - 1) ? "완료 및 복사" : "다음";
    document.getElementById("reasonModal").style.display = "flex";
    setTimeout(() => document.getElementById("reasonInput").focus(), 50);
  }

  function nextVariable() {
    const input = document.getElementById("reasonInput").value.trim();
    const currentPlaceholder = noticeFlow.placeholders[noticeFlow.currentIndex];
    noticeFlow.results.push(input === "" ? currentPlaceholder : input);
    if (noticeFlow.currentIndex < noticeFlow.placeholders.length - 1) {
      noticeFlow.currentIndex++;
      showVariableModal();
    } else {
      finishNoticeFlow();
    }
  }

  function finishNoticeFlow() {
    let finalVal = noticeFlow.originalText;
    const regex = /00|OOO|O시|O분|0명|약0시간|\([^\)]+\)/g;
    let i = 0;
    finalVal = finalVal.replace(regex, () => noticeFlow.results[i++]);
    copyText(finalVal);
    closeReasonModal();
  }

  function closeReasonModal() { document.getElementById("reasonModal").style.display = "none"; }

  function copyText(txt) {
    const el = document.createElement('textarea');
    el.value = txt; document.body.appendChild(el);
    el.select(); document.execCommand('copy');
    document.body.removeChild(el);
    showT("복사되었습니다!"); closeModal();
  }

  function openQty(cat, item) {
    curKey = `${cat}::${item.name}`;
    const s = state.get(curKey);
    if(s && s.checked) { s.checked = false; s.qty = 0; renderList(); update(); }
    else {
      document.getElementById("mTitle").textContent = item.name;
      const input = document.getElementById("mInput");
      input.value = 1; document.getElementById("qtyModal").style.display = "flex";
      setTimeout(() => { input.focus(); input.select(); }, 50);
    }
  }

  function confirmQty() {
    const v = parseInt(document.getElementById("mInput").value);
    if(v > 0) { const s = state.get(curKey); s.checked = true; s.qty = v; }
    closeModal(); renderList(); update();
  }

  function removeIdx() {
    const s = state.get(curKey); s.checked = false; s.qty = 0;
    closeModal(); renderList(); update();
  }

  function closeModal() {
    document.getElementById("qtyModal").style.display = "none";
    document.getElementById("guideModal").style.display = "none";
  }

  function update() {
    let baseF = 0, baseT = 0; let rows = "";
    state.forEach(s => {
      if(s.checked) {
        baseF += s.item.fine * s.qty; baseT += s.item.time * s.qty;
        rows += `<div class="calc-item"><span>• ${s.item.name} x${s.qty}</span><span>${(s.item.fine*s.qty/10000).toLocaleString()}만</span></div>`;
      }
    });
    const b = parseInt(document.getElementById("bailIn").value)||0;
    const reducedT = Math.min(b, baseT);
    const extraF = reducedT * 3000000;
    if (b > 0) rows = `<div class="calc-item bail"><span>[보석금 감면] -${reducedT}분</span><span>+${(extraF/10000).toLocaleString()}만</span></div>` + rows;
    const finalT = Math.max(0, baseT - b);
    const finalF = baseF + extraF;
    document.getElementById("resFine").textContent = finalF.toLocaleString() + "원";
    document.getElementById("resFineKo").textContent = (finalF/10000).toLocaleString() + " 만원";
    document.getElementById("resTime").textContent = finalT + "분";
    document.getElementById("calcRows").innerHTML = rows;
    const tCard = document.getElementById("timeCard");
    const tLabel = document.getElementById("timeLabel");
    if(finalT > 120) { tCard.classList.add("warning"); tLabel.textContent = "최종 구금 시간 (초과!)"; }
    else { tCard.classList.remove("warning"); tLabel.textContent = "최종 구금 시간"; }
  }

  function renderTabs() {
    const $t = document.getElementById("tabs"); $t.innerHTML = "";
    Object.keys(DATA).forEach(c => {
      const btn = document.createElement("button"); btn.className = `tab ${c===activeTab?'active':''}`;
      btn.textContent = c; btn.onclick = () => { activeTab = c; renderTabs(); renderList(); };
      $t.appendChild(btn);
    });
  }

  function resetAll() {
    state.forEach(s => { s.checked = false; s.qty = 0; });
    document.getElementById("bailIn").value = 0;
    renderList(); update(); showT("초기화 되었습니다!");
  }

  function copyFinal() {
    let txt = `[엑시트 법률 산정 내역]\n\n`;
    let baseT = 0;
    state.forEach(s => { 
      if(s.checked) {
        txt += `- ${s.item.name} x${s.qty} (${(s.item.fine*s.qty).toLocaleString()}원)\n`;
        baseT += s.item.time * s.qty;
      }
    });
    const b = parseInt(document.getElementById("bailIn").value)||0;
    if (b > 0) {
      const reducedT = Math.min(b, baseT);
      const extraF = reducedT * 3000000;
      txt += `\n[보석금 감면 내역]\n- 감면 시간: ${reducedT}분\n- 추가 보석금: ${extraF.toLocaleString()}원\n`;
    }
    txt += `\n최종 벌금 합계: ${document.getElementById("resFine").textContent}\n최종 구금 시간: ${document.getElementById("resTime").textContent}`;
    const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el);
    el.select(); document.execCommand('copy'); document.body.removeChild(el);
    showT("전체 내역이 복사되었습니다!");
  }

  document.getElementById("bailIn").oninput = update;
  window.addEventListener('keydown', e => { if(e.key === "Escape") { closeModal(); closeReasonModal(); } });
  renderTabs(); renderList(); setTheme('dark');
</script>
</body>
</html>
